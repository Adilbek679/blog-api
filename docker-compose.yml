services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — основная база данных
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: blogapi
      POSTGRES_USER: blogapi
      POSTGRES_PASSWORD: blogapi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "blogapi"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — broker, cache, channel layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Django (Daphne ASGI) — HTTP + WebSockets
  # ---------------------------------------------------------------------------
  # Note: port 8000 is NOT published to the host any more.  All external
  # traffic now enters through the nginx service on port 80.  The web service
  # still listens on 8000 inside the Compose network, so other containers
  # (celery_worker, nginx) can reach it via `web:8000`.
  web:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - settings/.env
    volumes:
      # `staticfiles` is populated by `collectstatic` in entrypoint.sh, then
      # served read-only by nginx from the same named volume.
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      daphne -b 0.0.0.0 -p 8000 settings.asgi:application

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy, static/media file server, WebSocket gateway
  # ---------------------------------------------------------------------------
  # Only this service is reachable from the host.  It terminates HTTP on :80
  # and forwards application traffic to Daphne via the `django_backend`
  # upstream defined in nginx/default.conf.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Read-only mounts: nginx must not modify these files.
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      - web

  # ---------------------------------------------------------------------------
  # Celery worker
  # ---------------------------------------------------------------------------
  celery_worker:
    build: .
    restart: unless-stopped
    env_file:
      - settings/.env
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A settings worker -l info

  # ---------------------------------------------------------------------------
  # Celery Beat
  # ---------------------------------------------------------------------------
  celery_beat:
    build: .
    restart: unless-stopped
    env_file:
      - settings/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A settings beat -l info

  # ---------------------------------------------------------------------------
  # Flower — мониторинг Celery
  # ---------------------------------------------------------------------------
  flower:
    build: .
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file:
      - settings/.env
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A settings flower
      --basic-auth=${BLOG_FLOWER_USER}:${BLOG_FLOWER_PASSWORD}

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  media_data:
  static_data: