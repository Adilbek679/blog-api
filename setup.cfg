[flake8]
max-line-length = 99
extend-ignore =
    # E203: whitespace before ':' — conflicts with Black/ruff formatting
    E203,
    # W503: line break before binary operator — conflicts with PEP 8 W504
    W503
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    apps/*/migrations,
    settings/env,
    manage.py
per-file-ignores =
    # Allow star imports in settings env files (from ..base import *)
    settings/env/*.py: F403, F405
