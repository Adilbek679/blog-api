# =============================================================================
#  Blog API — nginx reverse proxy config (Daphne/ASGI backend)
# =============================================================================

# Translates Upgrade header for WebSocket handshake.
# If client sends Upgrade: websocket → Connection: upgrade, otherwise → close.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# web:8000 is resolved via Compose DNS.
upstream django_backend {
    server web:8000;
}

server {
    listen 80;
    server_name localhost _;

    # Needed for avatar uploads (default 1 MiB is too small).
    client_max_body_size 25M;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Served from the static_data named volume (collectstatic output).
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # User uploads — no long cache since URLs are not content-hashed.
    location /media/ {
        alias /var/www/media/;
        access_log off;
    }

    # WebSocket — HTTP/1.1 + Upgrade/Connection headers required.
    # Long timeout to keep idle connections alive.
    location /ws/ {
        proxy_pass http://django_backend;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Catch-all — forwards everything else to Daphne.
    location / {
        proxy_pass http://django_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for SSE responses.
        proxy_buffering off;
    }
}